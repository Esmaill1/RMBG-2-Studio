<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو الهلال | إزالة الخلفية بالذكاء الاصطناعي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='phosphor/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <header class="header">
                <h1>ستوديو الهلال</h1>
                <p>إزالة الخلفية بالذكاء الاصطناعي</p>
                <div class="model-badge">
                    <i class="ph ph-microchip"></i>
                    <span>BRIA-RMBG 2.0</span>
                </div>
            </header>

            <section class="workspace">
                <div class="upload-zone" id="upload-zone">
                    <input type="file" id="file-input" accept="image/*" multiple hidden>
                    <div class="upload-content">
                        <div class="upload-icon-wrapper">
                            <i class="ph ph-cloud-arrow-up"></i>
                        </div>
                        <h3>أضف صورك</h3>
                        <p>اسحب وأفلت هنا، أو اضغط لاختيار الملفات</p>
                        <span class="format-badge">JPG · PNG · WEBP — 50 MB حد أقصى</span>
                    </div>
                </div>

                <div class="progress-section" id="progress-section" style="display: none;">
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                    <span class="progress-label" id="progress-text">يعالج الصور...</span>
                </div>

                <div class="results-header" id="results-header" style="display: none;">
                    <h2>النتائج</h2>
                    <div class="results-actions">
                        <button id="download-all-btn" class="btn btn-primary">
                            <i class="ph ph-file-archive"></i> تحميل الكل
                        </button>
                        <button id="clear-all-btn" class="btn btn-ghost-danger">
                            <i class="ph ph-trash"></i> حذف الكل
                        </button>
                    </div>
                </div>

                <div class="results-grid" id="results-grid"></div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
