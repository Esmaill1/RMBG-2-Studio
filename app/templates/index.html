<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMBG-2 Studio | إزالة الخلفية بالذكاء الاصطناعي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=2) }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="grid-overlay"></div>

    <div class="app-container">
        <main class="main-content anim-stagger" data-delay="0">
            <header class="section-header anim-stagger" data-delay="1">
                <div class="header-accent-line"></div>
                <div class="corner-accent top-right"></div>
                <div class="corner-accent bottom-left"></div>
                <h1>ستوديو الهلال</h1>
                <p>اداة إزالة الخلفيات .</p>
                <div class="model-badge">
                    <i class="ph ph-microchip"></i>
                    <span>BRIA-RMBG 2.0</span>
                </div>
            </header>

            <div class="workspace anim-stagger" data-delay="2">
                <div class="upload-zone" id="upload-zone">
                    <input type="file" id="file-input" accept="image/*" multiple hidden>
                    <div class="upload-glow-ring"></div>
                    <div class="upload-content">
                        <div class="upload-icon-wrapper">
                            <i class="ph ph-cloud-arrow-up"></i>
                        </div>
                        <h3>رفع الصور</h3>
                        <p>اسحب وأفلت الملفات هنا</p>
                        <span class="supported-formats">JPG, PNG, WEBP (بحد أقصى 200 ميجابايت)</span>
                    </div>
                </div>

                <div class="loading-bar-container" id="loading-bar-container" style="display: none;">
                    <div class="loading-bar">
                        <div class="progress" id="progress-bar"></div>
                    </div>
                    <span id="progress-text">جاري المعالجة...</span>
                </div>

                <div class="results-header" id="results-header" style="display: none;">
                    <h2>الصور المعالجة</h2>
                    <div class="results-actions">
                        <button id="download-all-btn" class="btn btn-primary">
                            <i class="ph ph-download-simple"></i> تحميل الكل (ZIP)
                        </button>
                        <button id="clear-all-btn" class="btn btn-danger-glass">
                            <i class="ph ph-trash"></i> مسح الكل
                        </button>
                    </div>
                </div>

                <div class="results-grid" id="results-grid">
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='app.js', v=2) }}"></script>
</body>
</html>
